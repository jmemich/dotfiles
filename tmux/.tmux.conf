# tmux.conf — managed by ~/dotfiles

# ---------------------------------------------------------------------------
# Display
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color (24-bit)
set -g allow-passthrough on                  # kitty image protocol -> inline matplotlib

# ---------------------------------------------------------------------------
# Behavior
# ---------------------------------------------------------------------------
setw -g mode-keys vi
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 100000
set -g mouse on

# ---------------------------------------------------------------------------
# Pane / window navigation (prefix + ...)
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind < resize-pane -L 5
bind > resize-pane -R 5
bind - resize-pane -D 5
bind + resize-pane -U 5

bind-key x kill-pane
bind-key & kill-window

# new window / splits inherit current pane's cwd
bind c  new-window      -c "#{pane_current_path}"
bind '"' split-window   -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# vim-tmux-navigator (inline — no plugin manager required)
# Same Ctrl+h/j/k/l navigates between vim splits AND tmux panes seamlessly.
# Needs the matching christoomey/vim-tmux-navigator plugin on the vim side.
# ---------------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ---------------------------------------------------------------------------
# Catppuccin Mocha status bar (inline — no plugin)
# ---------------------------------------------------------------------------
set -g status-style              "fg=#cdd6f4,bg=#1e1e2e"
set -g status-left               "#[fg=#cba6f7,bold] #S "
set -g status-right              "#[fg=#a6e3a1] %H:%M "
setw -g window-status-current-style  "fg=#1e1e2e,bg=#cba6f7,bold"
setw -g window-status-style          "fg=#cdd6f4"
set -g pane-border-style         "fg=#313244"
set -g pane-active-border-style  "fg=#cba6f7"
set -g message-style             "fg=#1e1e2e,bg=#f9e2af"
