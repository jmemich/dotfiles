# starship.toml — Catppuccin Mocha
# Clean prompt that works with or without a Nerd Font.

palette = "catppuccin_mocha"

format = """$directory$git_branch$git_status$python$character"""

add_newline = false

[character]
success_symbol = "[❯](mauve)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "bold green"
symbol = ""
format = "[on $symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"

[python]
style = "bold yellow"
symbol = "py "
format = "[\\($virtualenv\\)]($style) "

# ---------------------------------------------------------------------------
